on:
  workflow_dispatch:
  push:
    paths:
      - kali/**
  workflow_run:
    workflows:
      - .github/workflows/pythonbuilder.yml
    types:
      - completed

env:
  REGISTRY: ghcr.io
  SRC: docker.io/kalilinux/kali-rolling:latest
  DST: ghcr.io/${{ github.repository }}/kali:latest
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kali:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Login to ${{ env.REGISTRY }} as ${{ github.actor }}
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Clone repository
      uses: actions/checkout@v3
    - name: Set up docker buildx
      uses: docker/setup-buildx-action@v2
    - name: Build from ${{ env.SRC }} and push the image to ${{ env.DST }}
      uses: docker/build-push-action@v4
      with:
        context: kali
        push: true
        tags: ${{ env.DST }}
        platforms: linux/amd64, linux/arm64
        build-args: |
          SRC=${{ env.SRC }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
